<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="profit_lens">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>profit_lens</title>
  <link rel="manifest" href="manifest.json">
  <script src="pwa-install.bundle.js"></script>
  <style>
    html,
    body {
      height: 100%;
      margin: 0;
    }

    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f6f4f1;
      color: #1d1a16;
      font-family: "Avenir Next", "SF Pro Text", "Segoe UI", sans-serif;
      z-index: 9999;
      opacity: 1;
      transition: opacity 0.3s ease;
    }

    #splash.splash-hide {
      opacity: 0;
      pointer-events: none;
    }

    .splash-card {
      text-align: center;
      padding: 32px 28px;
      border-radius: 20px;
      background: #ffffff;
      box-shadow: 0 10px 30px rgba(17, 15, 12, 0.12);
      min-width: 220px;
    }

    .splash-logo {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.4px;
    }

    .splash-tagline {
      margin-top: 8px;
      font-size: 14px;
      color: #5c5650;
    }

    .splash-dots {
      display: inline-flex;
      gap: 6px;
      margin-top: 18px;
    }

    .splash-dots span {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #8b847c;
      animation: splash-pulse 0.9s infinite ease-in-out;
    }

    .splash-dots span:nth-child(2) {
      animation-delay: 0.15s;
    }

    .splash-dots span:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes splash-pulse {
      0%,
      100% {
        transform: scale(0.9);
        opacity: 0.6;
      }
      50% {
        transform: scale(1.15);
        opacity: 1;
      }
    }

    @media (max-width: 480px) {
      .splash-card {
        width: 80%;
      }
    }
  </style>
</head>
<body>
  <div id="splash" aria-live="polite" aria-busy="true">
    <div class="splash-card">
      <div class="splash-logo">Profit Lens</div>
      <div class="splash-tagline">Analyse rapide de rentabilite</div>
      <div class="splash-dots" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </div>
  <script>
    window.addEventListener("flutter-first-frame", function () {
      var splash = document.getElementById("splash");
      if (!splash) return;
      splash.classList.add("splash-hide");
      setTimeout(function () {
        if (splash && splash.parentNode) {
          splash.parentNode.removeChild(splash);
        }
      }, 350);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
  <pwa-install manual-chrome manual-apple></pwa-install>
</body>
</html>
