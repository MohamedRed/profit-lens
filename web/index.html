<html lang="fr">
<head>

  <meta charset="UTF-8">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <title>ProfitLens</title>

  <link rel="dns-prefetch" href="https://js.stripe.com">
  <link rel="preconnect" href="https://checkout.stripe.com" crossorigin>

  <style>
    html,
    body {
      height: var(--app-height, 100%);
      margin: 0;
      overscroll-behavior-x: none;
      touch-action: pan-y;
    }

    #edge-swipe-guard-left,
    #edge-swipe-guard-right {
      position: fixed;
      top: 0;
      bottom: 0;
      width: 16px;
      background: transparent;
      z-index: 2147483647;
      pointer-events: none;
      touch-action: none;
    }

    #edge-swipe-guard-left {
      left: 0;
    }

    #edge-swipe-guard-right {
      right: 0;
    }

    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f6f4f1;
      color: #1d1a16;
      font-family: "Avenir Next", "SF Pro Text", "Segoe UI", sans-serif;
      z-index: 9999;
      opacity: 1;
      transition: opacity 0.3s ease;
    }

    #splash.splash-hide {
      opacity: 0;
      pointer-events: none;
    }

    .splash-card {
      text-align: center;
      padding: 32px 28px;
      border-radius: 20px;
      background: #ffffff;
      box-shadow: 0 10px 30px rgba(17, 15, 12, 0.12);
      min-width: 220px;
    }

    .splash-logo {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.4px;
    }

    .splash-tagline {
      margin-top: 8px;
      font-size: 14px;
      color: #5c5650;
    }

    .splash-dots {
      display: inline-flex;
      gap: 6px;
      margin-top: 18px;
    }

    .splash-dots span {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #8b847c;
      animation: splash-pulse 0.9s infinite ease-in-out;
    }

    .splash-dots span:nth-child(2) {
      animation-delay: 0.15s;
    }

    .splash-dots span:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes splash-pulse {
      0%,
      100% {
        transform: scale(0.9);
        opacity: 0.6;
      }
      50% {
        transform: scale(1.15);
        opacity: 1;
      }
    }

    @media (max-width: 480px) {
      .splash-card {
        width: 80%;
      }
    }
  </style>
</head>
<body>
  <div id="splash" aria-live="polite" aria-busy="true">
    <div class="splash-card">
      <div class="splash-logo">Profit Lens</div>
      <div class="splash-tagline">Analyse rapide de rentabilite</div>
      <div class="splash-dots" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </div>
  <div id="edge-swipe-guard-left" aria-hidden="true"></div>
  <div id="edge-swipe-guard-right" aria-hidden="true"></div>
  <script>
    window.addEventListener("beforeinstallprompt", function (event) {
      event.preventDefault();
      window.defferedPromptEvent = event;
    });

    (function () {
      var setAppHeight = function () {
        var isStandalone =
          (window.matchMedia &&
            window.matchMedia("(display-mode: standalone)").matches) ||
          window.navigator.standalone === true;
        var height = isStandalone ? window.screen.height : window.innerHeight;
        document.documentElement.style.setProperty("--app-height", height + "px");
      };

      setAppHeight();
      window.addEventListener("orientationchange", setAppHeight);
    })();

    (function () {
      // In iOS PWAs, an edge swipe can trigger browser history navigation.
      // That feels like an accidental app exit, so we block it.
      var ua = navigator.userAgent || "";
      var isIos = /iPad|iPhone|iPod/.test(ua);
      var isStandalone =
        (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches) ||
        window.navigator.standalone === true;
      if (!isIos || !isStandalone) return;

      // Extra insurance: fixed edge guards stop Safari from treating the gesture
      // as browser navigation (it becomes an interaction with a page element).
      var guardLeft = document.getElementById("edge-swipe-guard-left");
      var guardRight = document.getElementById("edge-swipe-guard-right");
      var blockEdgeTouch = function (event) {
        event.preventDefault();
      };

      [guardLeft, guardRight].forEach(function (el) {
        if (!el) return;
        el.style.pointerEvents = "auto";
        el.addEventListener("touchstart", blockEdgeTouch, { passive: false });
        el.addEventListener("touchmove", blockEdgeTouch, { passive: false });
      });

      // iOS edge-swipe navigation tends to trigger when starting extremely
      // close to the screen edge. Block that aggressively.
      var hardEdgeWidth = 12;
      // Wider band for softer blocking (helps on diagonal swipes).
      var edgeWidth = 32;
      var startX = 0;
      var startY = 0;
      var tracking = false;

      document.addEventListener(
        "touchstart",
        function (event) {
          if (!event.touches || event.touches.length !== 1) return;
          var t = event.touches[0];
          startX = t.clientX;
          startY = t.clientY;

          // Block the extreme-edge start immediately to prevent browser history
          // navigation. Our UI has padding, so this won't block real controls.
          if (startX <= hardEdgeWidth || startX >= (window.innerWidth - hardEdgeWidth)) {
            tracking = true;
            event.preventDefault();
            return;
          }

          tracking = startX <= edgeWidth || startX >= (window.innerWidth - edgeWidth);
        },
        { passive: false, capture: true }
      );

      document.addEventListener(
        "touchend",
        function () {
          tracking = false;
        },
        { passive: true, capture: true }
      );

      document.addEventListener(
        "touchcancel",
        function () {
          tracking = false;
        },
        { passive: true, capture: true }
      );

      document.addEventListener(
        "touchmove",
        function (event) {
          if (!tracking) return;
          if (!event.touches || event.touches.length !== 1) return;
          var t = event.touches[0];
          var dx = t.clientX - startX;
          var dy = t.clientY - startY;

          // Only block a mostly-horizontal gesture that started at the edge.
          if (Math.abs(dx) < 8) return;
          if (Math.abs(dx) < Math.abs(dy) * 0.6) return;

          // Left edge: swipe right (back). Right edge: swipe left (forward).
          if (startX <= edgeWidth && dx > 0) {
            event.preventDefault();
          } else if (startX >= (window.innerWidth - edgeWidth) && dx < 0) {
            event.preventDefault();
          }
        },
        { passive: false, capture: true }
      );
    })();

    window.addEventListener("flutter-first-frame", function () {
      var splash = document.getElementById("splash");
      if (!splash) return;
      splash.classList.add("splash-hide");
      setTimeout(function () {
        if (splash && splash.parentNode) {
          splash.parentNode.removeChild(splash);
        }
      }, 350);
    });
  </script>
  <script>
    (function () {
      if (!("serviceWorker" in navigator)) return;

      var isReloading = false;
      navigator.serviceWorker.addEventListener("controllerchange", function () {
        if (isReloading) return;
        isReloading = true;
        window.location.reload();
      });

      navigator.serviceWorker.ready
        .then(function (registration) {
          if (!registration) return;
          registration.update();
          if (registration.waiting) {
            registration.waiting.postMessage("skipWaiting");
          }
          registration.addEventListener("updatefound", function () {
            var newWorker = registration.installing;
            if (!newWorker) return;
            newWorker.addEventListener("statechange", function () {
              if (
                newWorker.state === "installed" &&
                navigator.serviceWorker.controller
              ) {
                newWorker.postMessage("skipWaiting");
              }
            });
          });
        })
        .catch(function () {});
    })();
  </script>
  <pwa-install manual-apple disable-chrome></pwa-install>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
