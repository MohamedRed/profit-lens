<!DOCTYPE html>
<html lang="fr">
<head>

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Analyse rapide de rentabilite des offres de livraison.">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <title>Liive Lens</title>

  <link rel="dns-prefetch" href="https://js.stripe.com">
  <link rel="preconnect" href="https://checkout.stripe.com" crossorigin>
  <link rel="dns-prefetch" href="https://checkout.stripe.com">

  <style>
    html,
    body {
      height: 100vh;
      min-height: 100vh;
      margin: 0;
      overscroll-behavior-x: none;
      touch-action: pan-y;
      position: fixed;
      width: 100%;
      overflow: hidden;
    }

    #flutter_view,
    #flutter_container,
    flt-glass-pane,
    flt-scene-host,
    flt-semantics-host {
      position: fixed !important;
      inset: 0 !important;
      width: 100vw !important;
      height: 100vh !important;
      max-width: 100vw !important;
      max-height: 100vh !important;
    }

    #edge-swipe-guard-left,
    #edge-swipe-guard-right {
      position: fixed;
      top: 0;
      bottom: 0;
      width: 16px;
      background: transparent;
      z-index: 2147483647;
      pointer-events: none;
      touch-action: none;
    }

    #edge-swipe-guard-left {
      left: 0;
    }

    #edge-swipe-guard-right {
      right: 0;
    }

    pwa-install {
      position: fixed;
      z-index: 2147483647;
    }

    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(80% 60% at 15% 10%, rgba(124, 92, 255, 0.18), transparent 60%),
        radial-gradient(70% 50% at 85% 15%, rgba(52, 211, 153, 0.14), transparent 60%),
        #f7f6fb;
      color: #1b1a20;
      font-family: "Avenir Next", "SF Pro Text", "Segoe UI", sans-serif;
      z-index: 9999;
      opacity: 1;
      transition: opacity 0.3s ease;
    }

    #splash.splash-hide {
      opacity: 0;
      pointer-events: none;
    }

    .splash-card {
      text-align: center;
      padding: 32px 28px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 20px 40px rgba(20, 16, 36, 0.12);
      border: 1px solid rgba(124, 92, 255, 0.18);
      min-width: 240px;
      backdrop-filter: blur(8px);
    }

    .splash-logo {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.6px;
    }

    .splash-tagline {
      margin-top: 8px;
      font-size: 15px;
      color: #5a5665;
    }

    .splash-progress {
      margin-top: 18px;
      height: 6px;
      border-radius: 999px;
      background: rgba(124, 92, 255, 0.15);
      overflow: hidden;
      position: relative;
    }

    .splash-progress span {
      position: absolute;
      inset: 0;
      width: 45%;
      border-radius: 999px;
      background: linear-gradient(90deg, #7c5cff, #4ade80);
      animation: splash-sweep 1.2s ease-in-out infinite;
    }

    @keyframes splash-sweep {
      0% {
        transform: translateX(-30%);
        opacity: 0.6;
      }
      50% {
        transform: translateX(70%);
        opacity: 1;
      }
      100% {
        transform: translateX(140%);
        opacity: 0.6;
      }
    }

    @media (max-width: 480px) {
      .splash-card {
        width: 80%;
      }
    }
  </style>
</head>
<body>
  <div id="splash" aria-live="polite" aria-busy="true">
    <div class="splash-card">
      <div class="splash-logo">Liive Lens</div>
      <div class="splash-tagline">Analyse rapide de rentabilite</div>
      <div class="splash-progress" aria-hidden="true">
        <span></span>
      </div>
    </div>
  </div>
  <div id="edge-swipe-guard-left" aria-hidden="true"></div>
  <div id="edge-swipe-guard-right" aria-hidden="true"></div>
  <script>
    (function () {
      var normalizeViewportMeta = function () {
        var metas = document.querySelectorAll("meta[name='viewport']");
        metas.forEach(function (meta) {
          if (!meta) return;
          var content = meta.getAttribute("content");
          if (!content) return;
          var normalized = content
            .replace(/,?\s*maximum-scale\s*=\s*[^,]+/gi, "")
            .replace(/,?\s*user-scalable\s*=\s*no/gi, "")
            .replace(/,\s*,/g, ",")
            .replace(/^\s*,\s*|\s*,\s*$/g, "")
            .trim();
          if (normalized !== content) {
            meta.setAttribute("content", normalized);
          }
        });
      };

      normalizeViewportMeta();
      var observer = new MutationObserver(normalizeViewportMeta);
      observer.observe(document.head, { childList: true, subtree: true });
    })();

    window.addEventListener("beforeinstallprompt", function (event) {
      event.preventDefault();
      window.defferedPromptEvent = event;
    });

    (function () {
      var lockViewport = function () {
        var root = document.documentElement;
        root.style.setProperty("--app-height", window.screen.height + "px");
      };
      lockViewport();
      window.addEventListener("orientationchange", lockViewport);
    })();

    (function () {
      // In iOS PWAs, an edge swipe can trigger browser history navigation.
      // That feels like an accidental app exit, so we block it.
      var ua = navigator.userAgent || "";
      var isIos = /iPad|iPhone|iPod/.test(ua);
      var isStandalone =
        (window.matchMedia && window.matchMedia("(display-mode: standalone)").matches) ||
        window.navigator.standalone === true;
      if (!isIos || !isStandalone) return;

      // Extra insurance: fixed edge guards stop Safari from treating the gesture
      // as browser navigation (it becomes an interaction with a page element).
      var guardLeft = document.getElementById("edge-swipe-guard-left");
      var guardRight = document.getElementById("edge-swipe-guard-right");
      var blockEdgeTouch = function (event) {
        event.preventDefault();
      };

      [guardLeft, guardRight].forEach(function (el) {
        if (!el) return;
        el.style.pointerEvents = "auto";
        el.addEventListener("touchstart", blockEdgeTouch, { passive: false });
        el.addEventListener("touchmove", blockEdgeTouch, { passive: false });
      });

      // iOS edge-swipe navigation tends to trigger when starting extremely
      // close to the screen edge. Block that aggressively.
      var hardEdgeWidth = 12;
      // Wider band for softer blocking (helps on diagonal swipes).
      var edgeWidth = 32;
      var startX = 0;
      var startY = 0;
      var tracking = false;

      document.addEventListener(
        "touchstart",
        function (event) {
          if (!event.touches || event.touches.length !== 1) return;
          var t = event.touches[0];
          startX = t.clientX;
          startY = t.clientY;

          // Block the extreme-edge start immediately to prevent browser history
          // navigation. Our UI has padding, so this won't block real controls.
          if (startX <= hardEdgeWidth || startX >= (window.innerWidth - hardEdgeWidth)) {
            tracking = true;
            event.preventDefault();
            return;
          }

          tracking = startX <= edgeWidth || startX >= (window.innerWidth - edgeWidth);
        },
        { passive: false, capture: true }
      );

      document.addEventListener(
        "touchend",
        function () {
          tracking = false;
        },
        { passive: true, capture: true }
      );

      document.addEventListener(
        "touchcancel",
        function () {
          tracking = false;
        },
        { passive: true, capture: true }
      );

      document.addEventListener(
        "touchmove",
        function (event) {
          if (!tracking) return;
          if (!event.touches || event.touches.length !== 1) return;
          var t = event.touches[0];
          var dx = t.clientX - startX;
          var dy = t.clientY - startY;

          // Only block a mostly-horizontal gesture that started at the edge.
          if (Math.abs(dx) < 8) return;
          if (Math.abs(dx) < Math.abs(dy) * 0.6) return;

          // Left edge: swipe right (back). Right edge: swipe left (forward).
          if (startX <= edgeWidth && dx > 0) {
            event.preventDefault();
          } else if (startX >= (window.innerWidth - edgeWidth) && dx < 0) {
            event.preventDefault();
          }
        },
        { passive: false, capture: true }
      );
    })();

    window.addEventListener("flutter-first-frame", function () {
      var splash = document.getElementById("splash");
      if (!splash) return;
      splash.classList.add("splash-hide");
      setTimeout(function () {
        if (splash && splash.parentNode) {
          splash.parentNode.removeChild(splash);
        }
      }, 350);
    });
  </script>
  <script>
    (function () {
      if (!("serviceWorker" in navigator)) return;

      var hasPendingControllerChange = false;
      var updateScheduled = false;
      navigator.serviceWorker.addEventListener("controllerchange", function () {
        hasPendingControllerChange = true;
      });

      var maybeReloadForUpdatedController = function () {
        if (!hasPendingControllerChange) return;
        if (document.visibilityState !== "hidden") return;
        window.location.reload();
      };
      document.addEventListener("visibilitychange", maybeReloadForUpdatedController);

      var runUpdate = function () {
        if (updateScheduled) return;
        updateScheduled = true;
        navigator.serviceWorker.ready
          .then(function (registration) {
            if (!registration) return;
            registration.update();
            if (registration.waiting) {
              registration.waiting.postMessage("skipWaiting");
            }
            registration.addEventListener("updatefound", function () {
              var newWorker = registration.installing;
              if (!newWorker) return;
              newWorker.addEventListener("statechange", function () {
                if (
                  newWorker.state === "installed" &&
                  navigator.serviceWorker.controller
                ) {
                  newWorker.postMessage("skipWaiting");
                }
              });
            });
          })
          .catch(function () {});
      };

      window.addEventListener(
        "load",
        function () {
          setTimeout(runUpdate, 30000);
        },
        { once: true }
      );
    })();
  </script>
  <pwa-install manual-apple disable-chrome></pwa-install>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
