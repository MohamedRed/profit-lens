name: Web Integration Smoke

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: web-integration-${{ github.ref }}
  cancel-in-progress: false

jobs:
  web-smoke:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter version
        run: flutter --version

      - name: Enable web
        run: flutter config --enable-web

      - name: Install dependencies
        run: flutter pub get

      - name: Run web integration tests
        env:
          CI: "true"
        run: flutter test integration_test -d chrome --dart-define=FIREBASE_CONFIGURED=false
