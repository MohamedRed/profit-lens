name: Web Integration Smoke

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: web-integration-${{ github.ref }}
  cancel-in-progress: false

jobs:
  web-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Flutter version
        run: flutter --version

      - name: Enable web
        run: flutter config --enable-web

      - name: Install dependencies
        run: flutter pub get

      - name: Run Flutter help unit tests
        run: flutter test test/features/help

      - name: Install functions dependencies
        run: npm --prefix functions install

      - name: Run functions unit tests
        run: npm --prefix functions run test

      - name: Validate integration test sources
        env:
          CI: "true"
        run: flutter analyze --no-fatal-infos integration_test
