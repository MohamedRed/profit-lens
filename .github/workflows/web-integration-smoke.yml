name: Web Integration Smoke

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: web-integration-${{ github.ref }}
  cancel-in-progress: false

jobs:
  web-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      WEB_RUNTIME_DEFINES_JSON: ${{ secrets.WEB_RUNTIME_DEFINES_JSON }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Write runtime defines
        run: |
          if [ -z "$WEB_RUNTIME_DEFINES_JSON" ]; then
            echo "Missing WEB_RUNTIME_DEFINES_JSON secret."
            exit 1
          fi
          printf "%s" "$WEB_RUNTIME_DEFINES_JSON" > tool/dev_runtime_defines.json

      - name: Build web bundle
        run: ./tool/build_web.sh

      - name: Run Qwik unit tests
        run: npm --prefix apps/qwik run test

      - name: Run Qwik lint
        run: npm --prefix apps/qwik run lint

      - name: Verify web bundle layout
        run: ./tool/verify_web_bundle_layout.sh

      - name: Install functions dependencies
        run: npm --prefix functions ci

      - name: Run functions unit tests
        run: npm --prefix functions run test
