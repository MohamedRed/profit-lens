name: AI Help Ticket

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "GitHub issue number to process"
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  ai_agent:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' &&
      github.event.action == 'labeled' &&
      github.event.label.name == 'ai:run')
    concurrency:
      group: ai-help-ticket-${{ github.event.issue.number || inputs.issue_number || github.run_id }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    env:
      FIREBASE_HELP_TICKET_WEBHOOK_URL: ${{ secrets.FIREBASE_HELP_TICKET_WEBHOOK_URL }}
      CODEX_HELP_TICKET_WEBHOOK_SECRET: ${{ secrets.CODEX_HELP_TICKET_WEBHOOK_SECRET }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_HELP_TICKET_MODEL: ${{ vars.GEMINI_HELP_TICKET_MODEL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CODING_AGENT_APP_ID }}
          private-key: ${{ secrets.CODING_AGENT_APP_PRIVATE_KEY }}

      - name: Configure GH auth
        run: |
          echo "GH_TOKEN=${{ steps.app-token.outputs.token }}" >> "$GITHUB_ENV"

      - name: Prepare prompt
        id: prompt
        run: |
          ISSUE_NUMBER_INPUT="${{ inputs.issue_number }}"
          if [ -n "$ISSUE_NUMBER_INPUT" ]; then
            ISSUE_NUMBER="$ISSUE_NUMBER_INPUT"
            ISSUE_TITLE="$(gh issue view "$ISSUE_NUMBER_INPUT" --json title --jq .title)"
            PROMPT_FILE="$RUNNER_TEMP/help_ticket_prompt.txt"
            gh issue view "$ISSUE_NUMBER_INPUT" --json body --jq .body > "$PROMPT_FILE"
          else
            ISSUE_NUMBER="${{ github.event.issue.number }}"
            ISSUE_TITLE="${{ github.event.issue.title }}"
            PROMPT_FILE="$RUNNER_TEMP/help_ticket_prompt.txt"
            printf "%s" "${{ github.event.issue.body }}" > "$PROMPT_FILE"
          fi
          cat <<'EOF' > "$RUNNER_TEMP/prompt_append.txt"
          ---
          You are an autonomous coding agent operating inside this repository.

          Goal:
          - Fix the issue described above by making real code changes in this repo.

          Requirements:
          - You MUST open and read the relevant files before editing.
          - You MUST apply concrete edits to files (not just describe them).
          - Keep changes minimal and targeted.
          - If you cannot make a fix, explain why and list the files you checked.
          - Run relevant tests or checks if possible; otherwise state why not.
          - Provide a short final summary, tests run, and files changed.

          EOF
          sed -E 's/^ {10}//' "$RUNNER_TEMP/prompt_append.txt" >> "$PROMPT_FILE"
          rm -f "$RUNNER_TEMP/prompt_append.txt"

          echo "ISSUE_NUMBER=$ISSUE_NUMBER" >> "$GITHUB_ENV"
          {
            echo "ISSUE_TITLE<<EOF"
            echo "$ISSUE_TITLE"
            echo "EOF"
          } >> "$GITHUB_ENV"
          echo "PROMPT_FILE=$PROMPT_FILE" >> "$GITHUB_ENV"
          echo "TICKET_ID=$(grep -m1 '^TicketId:' "$PROMPT_FILE" | cut -d':' -f2- | xargs)" >> "$GITHUB_ENV"
          echo "TICKET_UID=$(grep -m1 '^Uid:' "$PROMPT_FILE" | cut -d':' -f2- | xargs)" >> "$GITHUB_ENV"

      - name: Notify running
        run: |
          if [ -n "$TICKET_ID" ] && [ -n "$TICKET_UID" ]; then
            curl -sS --fail-with-body -X POST "$FIREBASE_HELP_TICKET_WEBHOOK_URL" \
              -H "Authorization: Bearer $CODEX_HELP_TICKET_WEBHOOK_SECRET" \
              -H "Content-Type: application/json" \
              -d "{\"ticketId\":\"$TICKET_ID\",\"uid\":\"$TICKET_UID\",\"status\":\"running\"}"
          fi

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Run Gemini
        run: |
          MODEL="${GEMINI_HELP_TICKET_MODEL:-gemini-3-pro-preview}"
          set -o pipefail
          GEMINI_LOG="$RUNNER_TEMP/gemini.log"
          gemini \
            --approval-mode=yolo \
            --sandbox \
            --model "$MODEL" \
            --prompt "$(cat "$PROMPT_FILE")" 2>&1 | tee "$GEMINI_LOG"

      - name: Debug status
        if: always()
        run: |
          echo "Git status after Gemini:"
          git status -sb || true

      - name: Check changes
        id: diff
        run: |
          if [ -f PR_DESCRIPTION.md ]; then
            rm -f PR_DESCRIPTION.md
          fi
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "has_uncommitted=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          AHEAD_COUNT=$(git rev-list --count origin/main..HEAD || echo "0")
          if [ "$AHEAD_COUNT" -gt 0 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "has_uncommitted=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "has_uncommitted=false" >> "$GITHUB_OUTPUT"
          fi

      - name: No changes
        if: steps.diff.outputs.has_changes == 'false'
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --body "No changes proposed by AI agent."
          if [ -n "$TICKET_ID" ] && [ -n "$TICKET_UID" ]; then
            curl -sS --fail-with-body -X POST "$FIREBASE_HELP_TICKET_WEBHOOK_URL" \
              -H "Authorization: Bearer $CODEX_HELP_TICKET_WEBHOOK_SECRET" \
              -H "Content-Type: application/json" \
              -d "{\"ticketId\":\"$TICKET_ID\",\"uid\":\"$TICKET_UID\",\"status\":\"no_changes\"}"
          fi

      - name: Create PR
        if: steps.diff.outputs.has_changes == 'true'
        run: |
          git config user.name "ai-agent-bot"
          git config user.email "ai-agent-bot@users.noreply.github.com"
          BRANCH="ai/help-ticket-$ISSUE_NUMBER-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          if [ "${{ steps.diff.outputs.has_uncommitted }}" = "true" ]; then
            git add -A
            git commit -m "AI agent fix: $ISSUE_TITLE"
          fi
          git push --set-upstream origin "$BRANCH"
          PR_URL=$(gh pr create \
            --title "AI agent fix: $ISSUE_TITLE" \
            --body "Fixes #$ISSUE_NUMBER" \
            --base main \
            --head "$BRANCH") || {
              PR_CREATE_URL="https://github.com/${{ github.repository }}/pull/new/$BRANCH"
              gh issue comment "$ISSUE_NUMBER" \
                --body "PR creation failed because GitHub Actions is not permitted to create PRs. Enable the repository setting or open manually: $PR_CREATE_URL"
              if [ -n "$TICKET_ID" ] && [ -n "$TICKET_UID" ]; then
                curl -sS --fail-with-body -X POST "$FIREBASE_HELP_TICKET_WEBHOOK_URL" \
                  -H "Authorization: Bearer $CODEX_HELP_TICKET_WEBHOOK_SECRET" \
                  -H "Content-Type: application/json" \
                  -d "{\"ticketId\":\"$TICKET_ID\",\"uid\":\"$TICKET_UID\",\"status\":\"failed\",\"message\":\"PR creation blocked by GitHub Actions permissions.\"}"
              fi
              exit 1
            }
          gh issue comment "$ISSUE_NUMBER" \
            --body "Opened PR: $PR_URL"
          PR_NUMBER=$(gh pr view "$PR_URL" --json number --jq .number)
          if [ -n "$TICKET_ID" ] && [ -n "$TICKET_UID" ]; then
            CALLBACK_PAYLOAD=$(jq -n \
              --arg ticketId "$TICKET_ID" \
              --arg uid "$TICKET_UID" \
              --arg prUrl "$PR_URL" \
              --arg branch "$BRANCH" \
              --argjson prNumber "$PR_NUMBER" \
              '{ticketId: $ticketId, uid: $uid, status: "pr_created", prUrl: $prUrl, prNumber: $prNumber, branch: $branch}')
            curl -sS --fail-with-body -X POST "$FIREBASE_HELP_TICKET_WEBHOOK_URL" \
              -H "Authorization: Bearer $CODEX_HELP_TICKET_WEBHOOK_SECRET" \
              -H "Content-Type: application/json" \
              -d "$CALLBACK_PAYLOAD"
          fi

      - name: Notify failure
        if: failure()
        run: |
          if [ -n "$TICKET_ID" ] && [ -n "$TICKET_UID" ]; then
            curl -sS --fail-with-body -X POST "$FIREBASE_HELP_TICKET_WEBHOOK_URL" \
              -H "Authorization: Bearer $CODEX_HELP_TICKET_WEBHOOK_SECRET" \
              -H "Content-Type: application/json" \
              -d "{\"ticketId\":\"$TICKET_ID\",\"uid\":\"$TICKET_UID\",\"status\":\"failed\"}"
          fi
