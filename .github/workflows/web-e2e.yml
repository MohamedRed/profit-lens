name: Web E2E

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "lib/**"
      - "web/**"
      - "integration_test/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/workflows/web-e2e.yml"
  push:
    branches: [main]
    paths:
      - "lib/**"
      - "web/**"
      - "integration_test/**"
      - "pubspec.yaml"
      - "pubspec.lock"
      - ".github/workflows/web-e2e.yml"

jobs:
  web-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Enable web
        run: flutter config --enable-web

      - name: Install dependencies
        run: flutter pub get

      - name: Run web integration tests
        env:
          CI: "true"
        run: flutter test integration_test -d chrome --dart-define=FIREBASE_CONFIGURED=false
