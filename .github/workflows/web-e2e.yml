name: Web App Checks

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/qwik/**"
      - "tool/**"
      - "firebase.json"
      - ".github/workflows/web-e2e.yml"
  push:
    branches: [main]
    paths:
      - "apps/qwik/**"
      - "tool/**"
      - "firebase.json"
      - ".github/workflows/web-e2e.yml"

jobs:
  web-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Qwik dependencies
        run: npm --prefix apps/qwik ci

      - name: Run Qwik lint
        run: npm --prefix apps/qwik run lint

      - name: Run Qwik unit tests
        run: npm --prefix apps/qwik run test

      - name: Build Qwik app
        run: npm --prefix apps/qwik run build
