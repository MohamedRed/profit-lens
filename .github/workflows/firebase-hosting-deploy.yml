name: Firebase Hosting Deploy

on:
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - "lib/**"
      - "web/**"
      - "apps/qwik/**"
      - "assets/**"
      - "tool/**"
      - "l10n.yaml"
      - "pubspec.yaml"
      - "pubspec.lock"
      - "firebase.json"
      - ".firebaserc"

permissions:
  contents: read

jobs:
  deploy-hosting:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      FIREBASE_PROJECT_ID: profit-lens-prod-2e417
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PROFIT_LENS_PROD_2E417 }}
      WEB_DART_DEFINES_JSON: ${{ secrets.WEB_DART_DEFINES_JSON }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Enable web
        run: flutter config --enable-web

      - name: Install dependencies
        run: flutter pub get

      - name: Write Dart defines
        run: |
          if [ -z "$WEB_DART_DEFINES_JSON" ]; then
            echo "Missing WEB_DART_DEFINES_JSON secret."
            exit 1
          fi
          printf "%s" "$WEB_DART_DEFINES_JSON" > tool/dev_dart_defines.json

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Configure Firebase credentials
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "Missing FIREBASE_SERVICE_ACCOUNT_PROFIT_LENS_PROD_2E417 secret."
            exit 1
          fi
          CREDENTIALS_PATH="$RUNNER_TEMP/firebase-service-account.json"
          printf "%s" "$FIREBASE_SERVICE_ACCOUNT" > "$CREDENTIALS_PATH"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$CREDENTIALS_PATH" >> "$GITHUB_ENV"

      - name: Deploy Hosting
        run: firebase deploy --project "$FIREBASE_PROJECT_ID" --only hosting --non-interactive
