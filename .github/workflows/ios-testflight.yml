name: iOS TestFlight

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-upload:
    runs-on: macos-15
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      FLUTTER_VERSION: "3.38.5"
      APPSTORE_KEY_ID: ${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}
      APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
      APPSTORE_KEY_BASE64: ${{ secrets.APPSTORE_CONNECT_API_KEY_BASE64 }}
      IOS_CERT_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
      IOS_CERT_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      IOS_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Install signing assets
        run: |
          set -euo pipefail
          if [[ -z "${IOS_CERT_BASE64}" || -z "${IOS_CERT_PASSWORD}" || -z "${IOS_PROFILE_BASE64}" ]]; then
            echo "Missing iOS signing secrets." >&2
            exit 1
          fi

          KEYCHAIN_PASSWORD="$(openssl rand -hex 12)"
          CERT_PATH="$RUNNER_TEMP/ios_distribution.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"

          echo "$IOS_CERT_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$IOS_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import "$CERT_PATH" -k build.keychain -P "$IOS_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcodebuild
          security list-keychains -d user -s build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")")
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

      - name: Build IPA
        run: flutter build ipa --release --export-method app-store --build-number "${{ github.run_number }}"

      - name: Upload to TestFlight
        run: |
          set -euo pipefail
          if [[ -z "${APPSTORE_KEY_ID}" || -z "${APPSTORE_ISSUER_ID}" || -z "${APPSTORE_KEY_BASE64}" ]]; then
            echo "Missing App Store Connect API key secrets." >&2
            exit 1
          fi

          mkdir -p "$HOME/.appstoreconnect/private_keys"
          KEY_PATH="$HOME/.appstoreconnect/private_keys/AuthKey_${APPSTORE_KEY_ID}.p8"
          echo "$APPSTORE_KEY_BASE64" | base64 --decode > "$KEY_PATH"

          xcrun altool --upload-app --type ios -f build/ios/ipa/*.ipa --apiKey "$APPSTORE_KEY_ID" --apiIssuer "$APPSTORE_ISSUER_ID"
