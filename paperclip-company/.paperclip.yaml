schema: "paperclip/v1"
company:
  brandColor: "#0f766e"
  requireBoardApprovalForNewAgents: true
  feedbackDataSharingEnabled: false
  metadata:
    specializes: "generic-ai-native-company"
    specializationKind: "domain_overlay"
    genericAiCompany:
      runtimePolicy: "hermes_only"
      approvalMode: "board_required_for_sensitive_actions"
      requiredAdapterType: "hermes_local"
      gstackUse: "composed_engineering_core"
      engineeringCoreModule: "generic-ai-engineering-core"
      growthOperatingModel: "vendor_neutral_lead_outreach"
    projectSpecialization:
      domain: "profit-lens"
      repository: "MohamedRed/profit-lens"
      outputType: "reviewable_operating_plan_and_product_workflows"
agents:
  ceo-hermes:
    role: "ceo"
    adapter:
      type: "hermes_local"
      config:
        hermesCommand: "/opt/lexprive/paperclip-hermes/scripts/hermes-ops-worker"
        cwd: "/opt/lexprive/ops/ai-company"
        timeoutSec: 7200
        extraArgs:
          - "--yolo"
          - "--max-turns"
          - "60"
        persistSession: false
        env:
          HERMES_MODEL: "gpt-5.5"
          HERMES_REASONING_EFFORT: "xhigh"
          PAPERCLIP_API_URL: "http://127.0.0.1:3100/api"
          AI_COMPANY_OPS_TOOL: "/opt/lexprive/paperclip-hermes/scripts/lexprive-ops-tool.mjs"
          LEXPRIVE_OPS_TOOL: "/opt/lexprive/paperclip-hermes/scripts/lexprive-ops-tool.mjs"
          AI_COMPANY_WORKER_SSH_KEY: "/var/lib/lexprive-ai-company/ssh/paperclip_worker_ed25519"
          LEXPRIVE_WORKER_SSH_KEY: "/var/lib/lexprive-ai-company/ssh/paperclip_worker_ed25519"
          AI_COMPANY_ARTIFACT_BASE_DIR: "/opt/lexprive/ops/ai-company"
